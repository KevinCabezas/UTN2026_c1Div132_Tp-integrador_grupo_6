<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop</title>

  <link rel="stylesheet" href="css/shop.css">
</head>

<body>

  <header>
    <nav class="container-nav">
      <a href="">
        <img src="./assets/logo.png" alt="Mundo tech">
        <span class="world">MUNDO</span>
        <span class="tech">TECH</span>
      </a>
      <div class="btn-nav">
        <a href="cart.html">

          <iconify-icon icon="mdi:cart-outline" class="icon-cart"></iconify-icon>
          <iconify-icon icon="fluent:arrow-right-32-filled" class="icon-cart"></iconify-icon>

          <!-- <a href="index.html">Cancelar</a> -->
        </a>
      </div>
    </nav>
  </header>
  <main>

    <section class="section-products">
      <div class="container-head">
        <h1>Nuestros productos</h1>

        <div class="container-menu">
          <div class="container-lines">
            <button id="all">Ver todo</button>
            <button id="tv">Televisores</button>
            <button id="sound">Sonido</button>
            <button id="laptop">Laptops</button>
            <button id="phones">Celulares</button>
          </div>
          <div id="paginacion" class="container-paginacion">
            <button id="btn-anterior">Anterior</button>
            <span id="info-pagina"></span>
            <button id="btn-siguiente">Siguiente</button>
          </div>

        </div>
      </div>
      <div id="lista-productos" class="container-products"></div>
    </section>


    <script type="module">
      import { getListProducts } from "./js/api.js";

      const listProducts = document.getElementById("lista-productos");

      const btnAll = document.getElementById("all");
      const btnTv = document.getElementById("tv");
      const btnSound = document.getElementById("sound");
      const btnLaptop = document.getElementById("laptop");
      const btnPhones = document.getElementById("phones");

      //=================== LOCAL STORAGE ===================//

      function obtenerCarrito() {
        return JSON.parse(localStorage.getItem("carrito")) || [];
      }

      function guardarCarrito(carrito) {
        localStorage.setItem("carrito", JSON.stringify(carrito));
      }

      //=================== CANTIDAD ===================//

      function aumentarCantidad(e) {
        const card = e.target.closest(".card-product");

        const spanQuantity = card.querySelector(".cantidad");

        spanQuantity.textContent = Number(spanQuantity.textContent) + 1;
      }

      function disminuirCantidad(e) {
        const card = e.target.closest(".card-product");

        const spanQuantity = card.querySelector(".cantidad");

        let cantidad = Number(spanQuantity.textContent);

        if (cantidad > 1) {
          spanQuantity.textContent = cantidad - 1;
        }
      }

      //=================== AGREGAR AL CARRITO ===================//

      function agregarAlCarrito(e) {
        const card = e.target.closest(".card-product");

        const id = Number(card.dataset.id);
        const nombre = card.dataset.name;
        const marca = card.dataset.brand;
        const precio = Number(card.dataset.price);

        console.log(card.dataset.name)
        const cantidad = Number(
          card.querySelector(".cantidad").textContent
        );

        const carrito = obtenerCarrito();

        const productoExistente = carrito.find(
          producto => producto.id === id
        );

        if (productoExistente) {
          productoExistente.cantidad += cantidad;
        } else {
          carrito.push({
            id,
            nombre,
            marca,
            precio,
            cantidad
          });
        }

        guardarCarrito(carrito);

        alert(`${cantidad} ${nombre} agregado(s) al carrito`);

        // Reiniciar cantidad seleccionada
        card.querySelector(".cantidad").textContent = 1;
      }

      //=================== PAGINACION ===================//

      const LIMIT = 8; // productos por página
      let paginaActual = 1;
      let lineaActual = null;

      const infoPagina = document.getElementById("info-pagina");
      const btnAnterior = document.getElementById("btn-anterior");
      const btnSiguiente = document.getElementById("btn-siguiente");

      //=================== RENDER ===================//

      async function renderProducts(pagina = 1) {
        try {

          const response = await getListProducts(pagina, LIMIT, lineaActual);

          const products = response.payload;

          paginaActual = response.currentPage;

          listProducts.innerHTML = "";

          products.forEach(product => {

            listProducts.innerHTML += `
          <div
            class="card-product"
            data-id="${product.id}"
            data-name="${product.name.replace(/"/g, '&quot;')}"
            data-brand="${product.brand}"
            data-price="${product.price}"
          >

            <div class="card-img">
              <img
                src="http://localhost:3000${product.image_url}"
                alt="${product.image_url}"
              >
            </div>

            <div class="card-footer">

              <h3>${product.name}</h3>

              <p>Marca: ${product.brand}</p>

              <p>Precio: $${product.price}</p>

              <div class="container-btn">

                <div class="btn-quantity">
                  <button class="btn-minus">-</button>

                  <span class="cantidad">1</span>

                  <button class="btn-plus">+</button>
                </div>

                <button class="btn-add">
                  Agregar al carrito
                </button>

              </div>

            </div>

          </div>
        `;
          });

          // Eventos +

          document.querySelectorAll(".btn-plus").forEach(btn => {
            btn.addEventListener("click", aumentarCantidad);
          });

          // Eventos -

          document.querySelectorAll(".btn-minus").forEach(btn => {
            btn.addEventListener("click", disminuirCantidad);
          });

          // Eventos agregar

          document.querySelectorAll(".btn-add").forEach(btn => {
            btn.addEventListener("click", agregarAlCarrito);
          });

          // Actualizamos el texto "Pagina X de Y"
          infoPagina.textContent = `Página ${response.currentPage} de ${response.totalPages}`;

          // Deshabilitamos "Anterior" si ya estamos en la primera pagina,
          // y "Siguiente" si ya estamos en la ultima
          btnAnterior.disabled = response.currentPage <= 1;
          btnSiguiente.disabled = response.currentPage >= response.totalPages;

        } catch (error) {
          console.error(error);
        }
      }


      btnTv.addEventListener("click", () => {
        lineaActual = 1;
        renderProducts(1);
      });

      btnSound.addEventListener("click", () => {
        lineaActual = 2;
        renderProducts(1);
      });

      btnLaptop.addEventListener("click", () => {
        lineaActual = 4;
        renderProducts(1);
      });

      btnPhones.addEventListener("click", () => {
        lineaActual = 3;
        renderProducts(1);
      });

      btnAll.addEventListener("click", () => {
        lineaActual = null;
        renderProducts(1);
      });

      btnAnterior.addEventListener("click", () => {
        if (paginaActual > 1) {
          renderProducts(paginaActual - 1);
        }
      });

      btnSiguiente.addEventListener("click", () => {
        renderProducts(paginaActual + 1);
      });

      renderProducts(1);
    </script>
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
  </main>
</body>

</html>
