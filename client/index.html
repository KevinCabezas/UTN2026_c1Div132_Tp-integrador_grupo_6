<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>

  <link rel="stylesheet" href="./css/index.css">
</head>

<body>
  <header>

  </header>
  <main>
    <div class="btn-redirect-login">
      <a href="http://localhost:3000/auth">
        <iconify-icon icon="ri:admin-line" class="icon-btn"></iconify-icon>
        Admin
        <iconify-icon icon="fluent:arrow-right-32-filled" class="icon-btn"></iconify-icon>
      </a>
    </div>
    <div class="container">
      <h2>Iniciar compras</h2>

      <form id="form">
        <label for="nombre">Ingrese su nombre</label>

        <input id="nombre" type="text" placeholder="Nombre..." required>

        <button type="submit">
          Ingresar
        </button>
      </form>
    </div>

    <script>
      const form = document.getElementById("form");
      const input = document.getElementById("nombre");
      const nombreGuardado = localStorage.getItem("nombre");


      form.addEventListener("submit", function (e) {
        e.preventDefault();

        const nombre = input.value.trim();

        if (!nombre) {
          alert("Ingrese un nombre valido");
          return;
        }

        localStorage.setItem("nombre", nombre);
        window.location.href = "shop.html";
        input.value = "";
      });
    </script>
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
  </main>
</body>

</html>
