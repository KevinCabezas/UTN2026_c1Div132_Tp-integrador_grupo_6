<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/logo.png" type="image/x-icon">

  <title>Carrito</title>
  <link rel="stylesheet" href="./css/cart.css">
  <style>

  </style>

</head>

<body>
  <header>
    <nav class="container-nav">
      <a href="">
        <img src="./assets/logo.png" alt="Mundo tech">
        <span class="world">MUNDO</span>
        <span class="tech">TECH</span>
      </a>
      <div class="btn-nav">
        <a href="shop.html">
          Ver productos
        </a>
      </div>
    </nav>
    <p class="alumnos">Alumnos: Leandro Ascevedo, Lucas Rossi, Kevin Cabezas</p>
  </header>
  <main>

    <div class="ticket">

      <h1>Ticket de Compra</h1>

      <table>
        <thead>
          <!-- Encabezado del ticket de compra -->
          <tr>
            <th>Producto</th>
            <th>Cant.</th>
            <th>Unit.</th>
            <th>Sub total</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <!-- Aca se renderizara los detalles de los productos del carrito guardo 
       en el localStorage y listo para hacer la compa -->
        <tbody id="product-detail"></tbody>
      </table>

      <div class="total">
        Total: $<span id="totalCompra">0</span>
      </div>

      <button id="btnComprar">
        Finalizar compra
      </button>

      <button id="btnImprimir">
        Imprimir Ticket
      </button>

      <p id="mensaje"></p>

    </div>

    <!-- Modal  -->
    <div id="modal-confirm" class="modal">
      <div class="modal-content">
        <p>¿Desea comfirmar la compra?</p>

        <div class="buttons">
          <button id="confirm">Comfirmar</button>
          <button id="cancel">Cancelar</button>
        </div>
      </div>
    </div>

    <div id="modal-exit" class="modal">
      <div id="modal-content">
        <button id="btn-exit">Salir</button>
      </div>
    </div>
  </main>

  <script type="module">

    import { createSale } from "./js/api.js";

    const modalConfirm = document.getElementById("modal-confirm");
    const btnConfirm = document.getElementById("confirm");
    const btnCancel = document.getElementById("cancel");

    const modalExit = document.getElementById("modal-exit");
    const btnExit = document.getElementById("btn-exit");

    const productDetail = document.getElementById("product-detail");
    const totalCompra = document.getElementById("totalCompra");
    const btnComprar = document.getElementById("btnComprar");
    const btnImprimir = document.getElementById("btnImprimir");
    const mensaje = document.getElementById("mensaje");
    let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
    const nombreCliente = localStorage.getItem("nombre");

    function imprimirTicket() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      let y = 20;


      const fecha = new Date().toLocaleString();

      // Encabezado
      doc.setFontSize(18);
      doc.text("MUNDO TECH", 20, y);

      y += 8;

      doc.setFontSize(10);
      doc.text("Ticket de compra", 20, y);

      y += 10;

      doc.line(20, y, 190, y);
      y += 10;

      // datos cliente
      doc.setFontSize(11);
      doc.text(`Nombre: ${nombreCliente}`, 20, y);
      y += 6;
      doc.text(`Fecha: ${fecha}`, 20, y);

      y += 10;

      // ENCABEZADO TABLA
      doc.setFontSize(11);
      doc.text("Producto", 20, y);
      doc.text("Cant.", 90, y);
      doc.text("Unit.", 120, y);
      doc.text("Subtotal", 150, y);

      y += 5;
      doc.line(20, y, 190, y);

      y += 8;

      let total = 0;

      // productos
      carrito.forEach((product) => {
        const subtotal = product.precio * product.cantidad;
        total += subtotal;

        doc.text(String(product.nombre), 20, y);
        doc.text(String(product.cantidad), 90, y);
        doc.text(`$${product.precio}`, 120, y);
        doc.text(`$${subtotal}`, 150, y);

        y += 8;
      });

      y += 5;

      doc.line(20, y, 190, y);
      y += 10;

      // total
      doc.setFontSize(14);
      doc.text(`TOTAL: $${total.toFixed(2)}`, 20, y);

      // nombre archivo
      const fechaArchivo = new Date().toISOString().replace(/[:.]/g, "-");
      doc.save(`ticket-${nombreCliente}-${fechaArchivo}.pdf`);
    }


    // -----------------------------------------------------------------------------------------------
    // funcion para renderizar los datos del carrito en el ticked
    function renderCarrito() {
      productDetail.innerHTML = "";
      let total = 0;


      carrito.forEach((product, index) => {
        const subtotal = product.precio * product.cantidad;

        total += subtotal;
        productDetail.innerHTML += `
        <tr  class="tr-details">
          <td>${product.nombre}</td>
          <td>${product.cantidad}</td>
          <td>$${product.precio}</td>
          <td>$${subtotal}</td>
           <td class="td-eliminar">
          <button id="btn-delete" class="btn-eliminar" data-index="${index}">
            Eliminar
          </button>
        </td>
        </tr>
        `;

      });

      totalCompra.textContent = total.toFixed(2);
    }


    function messageStockError(listErrors = []) {

      console.log(listErrors)
      if (listErrors.length > 0) {
        console.log("entro")
        listErrors.forEach(error => {
          const product = carrito.find(p => p.id === error.product_id);

          if (product) {
            let cantidadIdeal = Math.floor(error.stock / 2);
            mensaje.textContent = `
              Producto: ${product.nombre} sin stock suficiente
              Compre menos de ${cantidadIdeal} unidades

            `;
            mensaje.className = "error";

            console.log(product.nombre);
            console.log(error.product_id);
            console.log(error.stock);
            console.log(error.quantity);
          }

          if (error.stock === 0) {
            mensaje.textContent = ` Producto: ${product.nombre} sin stock`;
            mensaje.className = "error";

          }
        });
      } else {
        mensaje.textContent = "Error del sistema: no se pudo realizar la compra";
        mensaje.className = "error";

      }
    }

    // funcion que mapea los datos del carrito y los pasa a un objeto(sale)
    // despues se lo pasmos al funcion create sale y esa funcion lo envia la back 
    async function sendDataSale() {

      const sale = {
        customer_name: localStorage.getItem("nombre"),
        products: carrito.map(p => ({
          product_id: p.id,
          quantity: p.cantidad
        }))

      };

      try {

        const response = await createSale(sale);
        console.log("holalla")
        localStorage.removeItem("carrito");
        localStorage.removeItem("nombre");

        mensaje.textContent = "Compra realizada con exito";
        mensaje.className = "success";
        btnComprar.style.display = "none";
        btnImprimir.style.display = "block";
      } catch (error) {
        console.log(error.errors)

        messageStockError(error.errors);
        document.querySelectorAll(".btn-eliminar").forEach(btn => {
          btn.disabled = false;
        });
      }
    }

    // button del ticket para confirmar la venta
    btnComprar.addEventListener("click", async () => {
      const nombreCliente = localStorage.getItem("nombre");

      if (!nombreCliente) {
        modalConfirm.classList.remove("active");
        mensaje.textContent = "Error en la compra, ingrese su nombre";
        mensaje.className = "error";

        setTimeout(() => {
          window.location.href = "index.html";
        }, 2000);

        return;
      }

      if (carrito.length > 0) {
        modalConfirm.classList.add("active");
      } else {
        modalConfirm.classList.remove("active");
        mensaje.textContent = "Sin productos en el carrito";
        mensaje.className = "error";
      }
    });


    btnImprimir.addEventListener("click", () => {

      // modalExit.classList.add("active");
      imprimirTicket();
      mensaje.textContent = "Ticket impreso";
      setTimeout(() => {
        window.location.href = "index.html";
      }, 3000);

    });

    // button modal salir que nos redirige a la pagina de encuestas
    btnExit.addEventListener("click", () => {
      modalExit.classList.remove("active");
      window.location.href = "survey.html";

    });

    let indexEliminar = null;

    productDetail.addEventListener("click", (e) => {

      if (e.target.classList.contains("btn-eliminar")) {
        indexEliminar = Number(e.target.dataset.index);
        carrito.splice(indexEliminar, 1);
        console.log(carrito)
        mensaje.textContent = "";
        // actualizamos el carrito en el localStorage ya qwue se elimino un producto
        // lo volvemos a renderizar con los nuevos datos
        localStorage.setItem("carrito", JSON.stringify(carrito));
        renderCarrito();
      }

    });

    // Button del modalConfirm para cancelar la compra
    btnCancel.addEventListener("click", () => {

      modalConfirm.classList.remove("active");


    });

    // Button del modalConfirm para confirmar la compra y se envien la data al back
    btnConfirm.addEventListener("click", () => {
      document.querySelectorAll(".btn-eliminar").forEach(btn => {
        btn.disabled = true;
      });
      // if (carrito.length())
      // console.log(carrito)
      sendDataSale()
      // carrito.splice(indexEliminar, 1);

      modalConfirm.classList.add("active");
      modalConfirm.classList.remove("active");

    });

    window.addEventListener("pageshow", (event) => {
      if (event.persisted) {
        const carrito = JSON.parse(localStorage.getItem("carrito")) || [];

        if (carrito.length === 0) {
          window.location.replace("index.html");
        }
      }
    });
    renderCarrito();

  </script>

  <script src="https://unpkg.com/jspdf@latest/dist/jspdf.umd.min.js"></script>
</body>

</html>
